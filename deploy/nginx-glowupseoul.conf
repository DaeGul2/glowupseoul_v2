# /etc/nginx/sites-available/glowupseoul
#
# 흐름:
#   /api/*      → Express (PM2, port 3001)
#   /sitemap.xml, /robots.txt → Express (SEO dynamic)
#   그 외       → client/dist (Vite SPA static + SPA fallback to index.html)
#
# 포트:
#   80  (HTTP)  — 일반 브라우징. 경고 없음. (단, 카메라 스캔은 보안 컨텍스트가 아니라 작동 X)
#   443 (HTTPS) — self-signed 인증서. 카메라/getUserMedia 는 보안 origin 에서만 동작하므로
#                 스캔 테스트는 https://13.124.18.135/ 로. self-signed 라 브라우저가 1회 경고 →
#                 "고급 → 계속 진행" 후 카메라 사용 가능. 도메인 + Let's Encrypt 적용 시 교체.
#   인증서 경로: /etc/ssl/glowupseoul/selfsigned.{crt,key}  (deploy_fast.sh 가 멱등 생성)
#
# 배포 후 적용:
#   sudo ln -sf /etc/nginx/sites-available/glowupseoul /etc/nginx/sites-enabled/glowupseoul
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ── 공통 location 블록 (80/443 동일) ──
# nginx 는 server 블록 안에서만 include 의 location 을 펼치므로 snippet 로 공유.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 13.124.18.135 _;

    # Build output (Vite). GitHub Actions rebuilds this on every deploy.
    root /home/ubuntu/glowupseoul_v2/client/dist;
    index index.html;

    # Common security / performance
    client_max_body_size 12M;          # AI 스캔 이미지 + 파트너 신청서 업로드 여유
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # — Static asset caching (hashed file names from Vite get max-age) —
    location ~* ^/assets/.*\.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|avif|ico|mp4)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # — API + concierge routes (Express on :3001) —
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # — SEO dynamic routes served by Express —
    location = /sitemap.xml { proxy_pass http://127.0.0.1:3001; proxy_set_header Host $host; }
    location = /robots.txt  { proxy_pass http://127.0.0.1:3001; proxy_set_header Host $host; }

    # — Health passthrough (handy for monitoring) —
    location = /healthz { proxy_pass http://127.0.0.1:3001/api/health; proxy_set_header Host $host; }

    # — SPA fallback: any non-asset request → index.html for React Router —
    location / {
        try_files $uri $uri/ /index.html;
    }

    # — Hide nginx version
    server_tokens off;

    # — Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

# ── HTTPS (self-signed) — 카메라 스캔용 보안 origin ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 13.124.18.135 _;

    ssl_certificate     /etc/ssl/glowupseoul/selfsigned.crt;
    ssl_certificate_key /etc/ssl/glowupseoul/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    root /home/ubuntu/glowupseoul_v2/client/dist;
    index index.html;

    client_max_body_size 12M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    location ~* ^/assets/.*\.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|avif|ico|mp4)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    location = /sitemap.xml { proxy_pass http://127.0.0.1:3001; proxy_set_header Host $host; }
    location = /robots.txt  { proxy_pass http://127.0.0.1:3001; proxy_set_header Host $host; }
    location = /healthz { proxy_pass http://127.0.0.1:3001/api/health; proxy_set_header Host $host; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
