name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 0) 소스 체크아웃 — diff 비교에 히스토리 필요
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1) 변경 경로 감지 — 불필요한 npm ci / build 스킵
      - name: Detect changed paths
        id: diff
        run: |
          set -e
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # 첫 push / 수동 실행 → 전체 빌드
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "client_changed=true" >> $GITHUB_OUTPUT
            echo "server_changed=true" >> $GITHUB_OUTPUT
            echo "deploy_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git fetch --no-tags --depth=200 origin $BEFORE || true
          git fetch --no-tags --depth=200 origin $AFTER  || true

          CHANGED="$(git diff --name-only "$BEFORE" "$AFTER" || true)"
          echo "Changed between $BEFORE..$AFTER:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^client/'; then
            echo "client_changed=true" >> $GITHUB_OUTPUT
          else
            echo "client_changed=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^server/'; then
            echo "server_changed=true" >> $GITHUB_OUTPUT
          else
            echo "server_changed=false" >> $GITHUB_OUTPUT
          fi
          # nginx config / deploy script 변경 시 nginx reload 까지
          if echo "$CHANGED" | grep -qE '^deploy/'; then
            echo "deploy_changed=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_changed=false" >> $GITHUB_OUTPUT
          fi

      # 2) EC2 SSH 진입 → .env 주입 + git pull + deploy script 실행
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          request_pty: true
          command_timeout: 12m
          envs: GITHUB_SHA
          script_stop: true
          script: |
            set -euo pipefail
            APP=/home/ubuntu/glowupseoul_v2

            cd "$APP"
            echo "── git fetch + reset to origin/main ──"
            git fetch --prune origin main
            git reset --hard origin/main
            git log -1 --pretty='%h %s'

            echo "── server/.env from SERVER_ENV secret ──"
            cat > server/.env <<'GLOWUP_ENV_EOF'
            ${{ secrets.SERVER_ENV }}
            GLOWUP_ENV_EOF
            chmod 600 server/.env

            echo "── run deploy script ──"
            chmod +x deploy/deploy_fast.sh
            export CLIENT_CHANGED='${{ steps.diff.outputs.client_changed }}'
            export SERVER_CHANGED='${{ steps.diff.outputs.server_changed }}'
            export DEPLOY_CHANGED='${{ steps.diff.outputs.deploy_changed }}'
            bash -lc "$APP/deploy/deploy_fast.sh"
